<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0052B4" />
  
  <!-- Data Grid Pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0C0F1A" stroke-width="1.5" stroke-opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <!-- Massive Typography: Shifted slightly left (to 130) while staying clear of the + box -->
  <g transform="translate(130, 180)">
    <text font-family="sans-serif" font-weight="900" font-size="160" fill="#F5F0E8" style="font-family: 'Syne', sans-serif; text-transform: uppercase; letter-spacing: -0.05em; line-height: 0.9;">
      <tspan x="0" y="0">GIORGIO</tspan>
      <tspan x="180" y="150">VANINI</tspan>
    </text>
  </g>
  
  <!-- Tagline Box: High-contrast gold box on the right -->
  <g transform="translate(480, 480)">
    <rect width="660" height="90" fill="#FFD700" stroke="#0C0F1A" stroke-width="8" />
    <text x="330" y="58" font-family="monospace" font-weight="700" font-size="32" fill="#0C0F1A" text-anchor="middle" style="font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em;">AI, Management &amp; Data Analysis</text>
  </g>
  
  <!-- Brutalist Frame -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#0C0F1A" stroke-width="12" />
  
  <!-- Top-Left Accent: The "+" Box. Centered considering the frame border width. -->
  <rect x="20" y="20" width="100" height="100" fill="#0C0F1A" />
  <text x="67" y="67" font-family="sans-serif" font-weight="900" font-size="80" fill="#FFD700" text-anchor="middle" dominant-baseline="central" style="font-family: 'Syne', sans-serif;">+</text>
</svg>
